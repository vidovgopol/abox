# ==========================================
# gateway-api-crds
# ==========================================
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: gateway-api-crds
  namespace: flux-system
spec:
  interval: 1h
  url: oci://ghcr.io/den-vasyliev/gateway-api-crds
  ref:
    tag: "1.4.0"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gateway-api-crds
  namespace: flux-system
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: gateway-api-crds
  install:
    crds: CreateReplace
---
# ==========================================
# kagent-crds
# ==========================================
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: kagent-crds
  namespace: flux-system
spec:
  interval: 1h
  url: oci://ghcr.io/kagent-dev/kagent/helm/kagent-crds
  ref:
    semver: ">=0.0.1"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent-crds
  namespace: kagent
spec:
  interval: 1h
  targetNamespace: kagent
  chartRef:
    kind: OCIRepository
    name: kagent-crds
    namespace: flux-system
  install:
    createNamespace: true
    crds: CreateReplace
---
# ==========================================
# kagent
# ==========================================
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: kagent
  namespace: flux-system
spec:
  interval: 1h
  url: oci://ghcr.io/kagent-dev/kagent/helm/kagent
  ref:
    semver: ">=0.0.1"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent
  namespace: kagent
spec:
  interval: 1h
  dependsOn:
    - name: kagent-crds
      namespace: kagent
  targetNamespace: kagent
  chartRef:
    kind: OCIRepository
    name: kagent
    namespace: flux-system
  install:
    createNamespace: true
  values:
    tools:
      querydoc:
        enabled: false
    agents:
      cilium-policy-agent:
        enabled: false
      cilium-manager-agent:
        enabled: false
      cilium-debug-agent:
        enabled: false
      promql-agent:
        enabled: false
      istio-agent:
        enabled: false
      istio-policy-agent:
        enabled: false
      istio-manager-agent:
        enabled: false
