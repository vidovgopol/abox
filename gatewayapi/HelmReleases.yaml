apiVersion: v1
kind: Namespace
metadata:
  name: agentgateway-system
---
# ==========================================
# Agentgateway
# ==========================================
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: agentgateway
  namespace: flux-system
spec:
  interval: 1h
  type: oci
  url: oci://ghcr.io/kgateway-dev/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentgateway-crds
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: agentgateway-crds
      version: v2.2.1
      sourceRef:
        kind: HelmRepository
        name: agentgateway
  install:
    crds: CreateReplace
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentgateway
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: agentgateway-system
  dependsOn:
    - name: agentgateway-crds
      namespace: flux-system
  chart:
    spec:
      chart: agentgateway
      version: v2.2.1
      sourceRef:
        kind: HelmRepository
        name: agentgateway
        namespace: flux-system
  install:
    createNamespace: true
