apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: flux-config
  namespace: flux-system
spec:
  interval: 5m
  url: oci://ghcr.io/den-vasyliev/a-box/flux-config
  ref:
    tag: latest
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-config
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: OCIRepository
    name: flux-config
  path: ./
  prune: true
  wait: true
