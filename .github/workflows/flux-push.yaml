name: Push Flux config as OCI artifact

on:
  push:
    branches: [main]
    paths:
      - 'gatewayapi/**'

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | flux registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push OCI artifact
        run: |
          flux push artifact oci://ghcr.io/${{ github.repository }}/flux-config:latest \
            --path="./gatewayapi" \
            --source="${{ github.repositoryUrl }}" \
            --revision="${{ github.ref_name }}@sha1:${{ github.sha }}"

      - name: Tag with git SHA
        run: |
          flux tag artifact oci://ghcr.io/${{ github.repository }}/flux-config:latest \
            --tag=${{ github.sha }}
