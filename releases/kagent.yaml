apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kagent
  namespace: flux-system
spec:
  interval: 1h
  url: oci://ghcr.io/kagent-dev/kagent/helm/kagent
  ref:
    tag: "0.7.23"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent
  namespace: flux-system
spec:
  interval: 1h
  postRenderers:
  - kustomize:
      patches:
      - patch: |
          - op: add
            path: /metadata/labels/app.kubernetes.io~1version
            value: "0.7.23"
        target:
          labelSelector: app.kubernetes.io/name=kagent
  dependsOn:
    - name: kagent-crds
      namespace: flux-system
  targetNamespace: kagent
  chartRef:
    kind: OCIRepository
    name: kagent
    namespace: flux-system
  install:
    createNamespace: true
  values:
    controller:
      image:
        tag: 0.7.23
    tag: 0.7.23
    ui:
      image:
        tag: 0.7.23
    tools:
      querydoc:
        enabled: false
    agents:
      cilium-policy-agent:
        enabled: false
      cilium-manager-agent:
        enabled: false
      cilium-debug-agent:
        enabled: false
      istio-agent:
        enabled: false
      istio-policy-agent:
        enabled: false
      istio-manager-agent:
        enabled: false
      argo-rollouts-conversion-agent:
        enabled: false
    providers:
      default: openAI
      openAI:
        apiKey: OPENAI_API_KEY
