apiVersion: v1
kind: Namespace
metadata:
  name: agentgateway-system
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kgateway
  namespace: flux-system
spec:
  interval: 1h
  url: oci://ghcr.io/kgateway-dev/charts/kgateway
  ref:
    tag: "2.3.0-main"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kgateway
  namespace: agentgateway-system
spec:
  interval: 1h
  targetNamespace: agentgateway-system
  dependsOn:
    - name: kgateway-crds
      namespace: flux-system
  chartRef:
    kind: OCIRepository
    name: kgateway
    namespace: flux-system
  install:
    createNamespace: true
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: agentgateway-external
  namespace: agentgateway-system
spec:
  gatewayClassName: kgateway
  listeners:
  - name: http
    port: 80
    protocol: HTTP
